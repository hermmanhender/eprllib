name: Versioned Documentation

on:
  release:
    types: [published]  # Se ejecuta automáticamente al publicar un Release
  workflow_dispatch:    # Útil si quieres actualizar la rama 'latest' manualmente

permissions:
  contents: write       # Necesario para que el bot pueda escribir en la rama 'docs'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-book-theme myst-parser
          pip install -e .

      - name: Build Sphinx
        run: |
          sphinx-build -b html docs docs/_build/html

      # 1. Despliega la carpeta de la versión (ej. v1.0.0)
      - name: Deploy Version (Tag)
        # Este paso solo se ejecuta si la acción fue lanzada por un Release
        if: github.event_name == 'release' 
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/_build/html
          branch: docs
          target-folder: ${{ github.event.release.tag_name }}
          clean: false # IMPORTANTE: Evita que se borren las versiones anteriores

      # 2. Despliega la carpeta 'latest' (la versión estable más reciente)
      - name: Deploy 'latest'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/_build/html
          branch: docs
          target-folder: latest
          clean: true # Limpia solo la carpeta 'latest' para no dejar archivos huérfanos de la versión anterior

      # 3. Crea y despliega el index.html raíz para redirigir automáticamente a 'latest'
      - name: Create redirect index
        run: |
          mkdir -p redirect_page
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=./latest/index.html" /></head><body></body></html>' > redirect_page/index.html
          touch redirect_page/.nojekyll
          
      - name: Deploy Root Redirect
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: redirect_page
          branch: docs
          clean: false
